name: LlucsBrain Evolution (Fragmented)

on:
  schedule:
    - cron: '0 0 * * *' # Todo dia à meia-noite
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libomp-dev

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Restore and Run Brain Simulation
        run: |
          mkdir -p build
          # Ajustado para o nome correto: brain_state_part_*.dat
          if ls brain_state_part_*.dat 1> /dev/null 2>&1; then
            cp brain_state_part_*.dat build/
            echo "Fragmentos anteriores restaurados com sucesso."
          else
            echo "Nenhum fragmento anterior encontrado. Iniciando do zero."
          fi
          
          cd build
          ./LlucsBrain

      - name: Commit and Push Brain Fragments
        run: |
          git config --global user.name "LlucsBrain Bot"
          git config --global user.email "llucs@brain.evolution"
          
          # Move os novos fragmentos (brain_state_part_*.dat) para a raiz
          if ls build/brain_state_part_*.dat 1> /dev/null 2>&1; then
            cp build/brain_state_part_*.dat .
          else
             echo "Erro: O simulador não gerou os arquivos de estado!"
             exit 1
          fi

          # Adiciona todos os fragmentos ao Git
          git add brain_state_part_*.dat
          git commit -m "Evolução diária fragmentada - Desenvolvido por Llucs" || echo "Sem mudanças no cérebro."
          git push
