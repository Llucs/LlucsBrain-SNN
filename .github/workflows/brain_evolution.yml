name: LlucsBrain Evolution (Fragmented)

on:
  schedule:
    - cron: '0 0 * * *' # Todo dia à meia-noite
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libomp-dev

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Restore and Run Brain Simulation
        run: |
          # Move todos os fragmentos existentes (.dat) para a pasta build para o simulador ler
          mkdir -p build
          cp brain_part_*.dat build/ 2>/dev/null || echo "Nenhum fragmento anterior encontrado."
          
          cd build
          ./LlucsBrain

      - name: Commit and Push Brain Fragments
        run: |
          git config --global user.name "LlucsBrain Bot"
          git config --global user.email "llucs@brain.evolution"
          
          # Move os novos fragmentos gerados na build para a raiz do repositório
          cp build/brain_part_*.dat . || echo "Erro: Nenhum fragmento gerado!"

          # Adiciona todos os fragmentos (ex: brain_part_0.dat, brain_part_1.dat...)
          git add brain_part_*.dat
          git commit -m "Evolução diária fragmentada - Desenvolvido por Llucs" || echo "Sem mudanças no cérebro."
          git push
