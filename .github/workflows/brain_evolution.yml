name: LlucsBrain Evolution (Gzip Mode)

on:
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite
  workflow_dispatch: # Permite execução manual

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libomp-dev gzip

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Restore and Run Brain Simulation
        run: |
          cd build
          # Se existir um estado salvo compactado (.gz), descompacta para o simulador ler o .dat
          if [ -f ../brain_state.dat.gz ]; then
            gunzip -c ../brain_state.dat.gz > brain_state.dat
            echo "Estado anterior restaurado com sucesso."
          else
            echo "Nenhum estado anterior encontrado. Iniciando cérebro do zero."
          fi
          
          # Executa o simulador do Llucs
          ./LlucsBrain

      - name: Commit and Push Brain State
        run: |
          # Configura o Bot do Llucs
          git config --global user.name "LlucsBrain Bot"
          git config --global user.email "llucs@brain.evolution"
          
          # Compacta o novo estado (220MB -> ~60MB) para caber no limite de 100MB do GitHub
          if [ -f build/brain_state.dat ]; then
            gzip -9 -c build/brain_state.dat > brain_state.dat.gz
            # Remove o .dat original para o Git não tentar subir ele por engano
            rm build/brain_state.dat
          fi

          # Adiciona o arquivo compactado e as configurações
          git add brain_state.dat.gz
          git commit -m "Evolução diária (Compactada) - Desenvolvido por Llucs" || echo "Nenhuma mudança detectada."
          git push
