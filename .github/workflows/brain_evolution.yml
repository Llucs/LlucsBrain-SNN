name: LlucsBrain Evolution

on:
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite
  workflow_dispatch: # Permite execução manual

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libomp-dev

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Run Brain Simulation
        run: |
          cd build
          ./LlucsBrain

      - name: Commit and Push Brain State
        run: |
          git config --global user.name "LlucsBrain Bot"
          git config --global user.email "llucs@brain.evolution"
          git add brain_state.dat
          git commit -m "Evolução diária do cérebro - Desenvolvido por Llucs" || echo "Nenhuma mudança no estado do cérebro."
          git push
          
