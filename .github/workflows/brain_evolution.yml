name: LlucsBrain Evolution

on:
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite
  workflow_dispatch: # Permite execução manual

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão necessária para o bot fazer o push das mudanças

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libomp-dev

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Run Brain Simulation
        run: |
          cd build
          # Executa o simulador do Llucs
          ./LlucsBrain

      - name: Commit and Push Brain State
        run: |
          # Configura o Bot do Llucs
          git config --global user.name "LlucsBrain Bot"
          git config --global user.email "llucs@brain.evolution"
          
          # Move o arquivo da pasta build para a raiz para o Git encontrar
          if [ -f build/brain_state.dat ]; then
            cp build/brain_state.dat .
          fi

          # Adiciona, commita e envia a evolução
          git add brain_state.dat
          git commit -m "Evolução diária do cérebro - Desenvolvido por Llucs" || echo "Nenhuma mudança detectada no estado do cérebro."
          git push
