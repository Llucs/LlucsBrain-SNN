name: LlucsBrain Evolution (LFS Mode)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          lfs: true # Habilita o suporte a LFS no checkout
          persist-credentials: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libomp-dev git-lfs

      - name: Configure Git LFS
        run: |
          git lfs install
          # Garante que arquivos .dat sejam tratados pelo LFS
          git lfs track "*.dat" 

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Run Brain Simulation
        run: |
          cd build
          ./LlucsBrain

      - name: Commit and Push with LFS
        run: |
          git config --global user.name "LlucsBrain Bot"
          git config --global user.email "llucs@brain.evolution"
          
          # Move o arquivo para a raiz
          cp build/brain_state.dat . || echo "Arquivo não encontrado"

          # Configura o LFS para o arquivo de estado
          git lfs track "brain_state.dat"
          git add .gitattributes
          git add brain_state.dat
          
          git commit -m "Evolução diária (LFS) - Desenvolvido por Llucs" || echo "Sem mudanças"
          git push
